<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        #box {
            color: #fff;
            text-align: center;
            background-image: url(images/christus.webp);
            background-position: 1114px 682px ;
            background-size: 1320px ;
            width: 800px;
            margin: auto;
            border: 4px solid #000;
            border-radius: 20px;
        }
        
        
        
        .spotlight {
            
            border: 10px solid #fff;
            border-radius: 50%;
            overflow: hidden;
            width: 80px;
            height: 80px;
            margin: auto;
        }

        .spotlight img {
             width: 80px;
            
        }

        .first_pres {
            width: 100px;
            height: 100px;
        }

        .first_pres img{
            width: 100px;
            
        }

        .president {
            width: 120px;
            height: 120px;
        }

        .president img {
            width: 120px;
        }

        .apostles {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            grid-template-rows: repeat(3, 120px);
            place-content: center;

        }

    </style>
</head>
<body>
    <div id="box" width="600px">
        <h1> First Presidency</h1>
        <img class="spotlight first_pres" src="images\eyring.webp" alt="">
        <img class="spotlight president" src="images\oaks.webp" alt="">
        <img class="spotlight first_pres" src="images\christofferson.webp" alt="">
        <h2>Quorum of the Twelve Apostles</h2>
        <div class="apostles">
        <img class="spotlight" src="images\uchtdorf.webp" alt="">
        <img class="spotlight" src="images\bednar.webp" alt="">
        <img class="spotlight" src="images\cook.webp" alt="">
        <img class="spotlight" src="images\anderson.webp" alt="">
        <img class="spotlight" src="images\rasband.webp" alt="">
        <img class="spotlight" src="images\stevenson.webp" alt="">
        <img class="spotlight" src="images\renlund.webp" alt="">
        <img class="spotlight" src="images\gong.webp" alt="">
        <img class="spotlight" src="images\soares.webp" alt="">
        <img class="spotlight" src="images\causse.webp" alt="">
        <img class="spotlight" src="images\kearon.webp" alt="">
        <img class="spotlight" src="images\gilbert.webp" alt="">
        </div>
    </div>
</body>
</html>
